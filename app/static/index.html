<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuMind — PDF Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --surface2:  #1a1e29;
    --border:    #252a38;
    --accent:    #e8ff47;
    --accent2:   #47c8ff;
    --text:      #e8eaf0;
    --text-dim:  #6b7280;
    --text-mute: #3a4055;
    --user-bg:   #1e2336;
    --ai-bg:     #141820;
    --error:     #ff5757;
    --success:   #4dffb4;
    --radius:    14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 12px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { color: var(--accent); }

  .pdf-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    transition: all 0.3s;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pdf-badge.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.06);
  }
  .pdf-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-mute);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .pdf-badge.active .dot { background: var(--accent); animation: pulse 1.8s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--error); color: var(--error); }

  /* ── Main layout ─────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Upload Panel ────────────────────────── */
  .upload-panel {
    width: 300px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 20px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    background: var(--surface2);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }
  .drop-text {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .drop-text strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 0.9rem; }
  .drop-limits {
    margin-top: 8px;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-mute);
  }

  .btn-upload {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    letter-spacing: 0.02em;
  }
  .btn-upload:hover { background: #f5ff7a; transform: translateY(-1px); }
  .btn-upload:active { transform: translateY(0); }
  .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Progress bar */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .progress-wrap.show { display: flex; }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; }
  }

  /* Status box */
  .status-box {
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.8rem;
    line-height: 1.5;
    display: none;
  }
  .status-box.show { display: block; }
  .status-box.success {
    background: rgba(77,255,180,0.08);
    border: 1px solid rgba(77,255,180,0.25);
    color: var(--success);
  }
  .status-box.error {
    background: rgba(255,87,87,0.08);
    border: 1px solid rgba(255,87,87,0.25);
    color: var(--error);
  }

  /* Info pills */
  .info-pills {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.75rem;
  }
  .pill-label { color: var(--text-mute); font-family: 'DM Mono', monospace; }
  .pill-val { color: var(--text); font-weight: 500; }

  /* ── Chat area ───────────────────────────── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-mute);
    text-align: center;
  }
  .empty-icon { font-size: 3rem; opacity: 0.4; }
  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    color: var(--text-dim);
  }
  .empty-sub { font-size: 0.82rem; line-height: 1.6; max-width: 280px; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.3s ease;
    max-width: 780px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }
  .avatar.ai  { background: var(--accent2); color: #0d0f14; }
  .avatar.usr { background: var(--accent);  color: #0d0f14; }

  .bubble {
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 0.88rem;
    line-height: 1.7;
    max-width: 620px;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(71,200,255,0.12);
    color: var(--text);
    border-top-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 4px;
  }
  .bubble-meta {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-mute);
    margin-top: 6px;
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 6px; align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-mute);
    animation: blink 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,100% { opacity: 0.3; transform: scale(0.9); }
    50%      { opacity: 1;   transform: scale(1.1); }
  }

  /* Timeout/error msg */
  .msg-error {
    background: rgba(255,87,87,0.08);
    border: 1px solid rgba(255,87,87,0.2);
    color: var(--error);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 0.82rem;
    align-self: flex-start;
    max-width: 500px;
    animation: fadeUp 0.3s ease;
  }

  /* ── Input row ───────────────────────────── */
  .input-row {
    padding: 18px 28px 22px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 10px 16px;
    transition: border-color 0.2s;
    gap: 8px;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    resize: none;
    min-height: 22px;
    max-height: 140px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-mute); }

  .btn-send {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    color: #0d0f14;
  }
  .btn-send:hover { background: #f5ff7a; transform: scale(1.05); }
  .btn-send:active { transform: scale(0.97); }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-send svg { width: 18px; height: 18px; }

  .char-hint {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-mute);
    text-align: center;
    padding-bottom: 2px;
  }

  /* Scrollbar for upload panel */
  .upload-panel::-webkit-scrollbar { width: 4px; }
  .upload-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media (max-width: 680px) {
    .upload-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 260px; }
    .layout { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────── -->
<header>
  <div class="logo">DocuMind<span class="logo-dot">.</span></div>
  <div class="pdf-badge" id="pdfBadge">
    <span class="dot"></span>
    <span id="pdfBadgeText">No PDF loaded</span>
  </div>
  <button class="btn-clear" id="btnClear" onclick="clearSession()">Clear chat</button>
</header>

<!-- ── Layout ───────────────────────────────────── -->
<div class="layout">

  <!-- Upload panel -->
  <aside class="upload-panel">
    <div class="panel-title">Upload PDF</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" onchange="handleFileSelect(event)"/>
      <span class="drop-icon">📄</span>
      <div class="drop-text">
        <strong>Drop PDF here</strong>
        or click to browse
      </div>
      <div class="drop-limits">Max 5 MB · 20 pages</div>
    </div>

    <div id="selectedFile" style="display:none; font-size:0.78rem; font-family:'DM Mono',monospace; color:var(--text-dim); word-break:break-all;"></div>

    <button class="btn-upload" id="btnUpload" onclick="uploadPDF()" disabled>
      Upload &amp; Analyse
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">Uploading…</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="status-box" id="statusBox"></div>

    <div class="info-pills" id="infoPills" style="display:none">
      <div class="panel-title">Document info</div>
      <div class="pill">
        <span class="pill-label">pages</span>
        <span class="pill-val" id="infoPages">—</span>
      </div>
      <div class="pill">
        <span class="pill-label">size</span>
        <span class="pill-val" id="infoSize">—</span>
      </div>
      <div class="pill">
        <span class="pill-label">session</span>
        <span class="pill-val" id="infoSession" style="font-size:0.65rem">—</span>
      </div>
    </div>
  </aside>

  <!-- Chat area -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Ask anything about your PDF</div>
        <div class="empty-sub">Upload a document on the left, then start asking questions here.</div>
      </div>
    </div>

    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="questionInput"
          placeholder="Ask a question about your PDF…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
          disabled
        ></textarea>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendQuestion()" disabled title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  let sessionId = null;
  let isLoading = false;

  // ── Drag & Drop ─────────────────────────────────
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  let selectedFile = null;
  function handleFileSelect(e) { setFile(e.target.files[0]); }

  function setFile(file) {
    if (!file) return;
    selectedFile = file;
    const el = document.getElementById('selectedFile');
    el.textContent = `📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
    el.style.display = 'block';
    document.getElementById('btnUpload').disabled = false;
    hideStatus();
  }

  // ── Upload ───────────────────────────────────────
  async function uploadPDF() {
    if (!selectedFile) return;
    const btn = document.getElementById('btnUpload');
    btn.disabled = true;
    showProgress('Uploading…');
    hideStatus();

    const fd = new FormData();
    fd.append('file', selectedFile);
    if (sessionId) fd.append('session_id', sessionId);

    try {
      setProgress(30);
      const res = await fetch('/upload', { method: 'POST', body: fd });
      setProgress(80);
      const data = await res.json();
      setProgress(100);

      if (!res.ok) {
        showStatus('error', '⚠️ ' + (data.detail || 'Upload failed.'));
        hideProgress();
        btn.disabled = false;
        return;
      }

      sessionId = data.session_id;
      showStatus('success', `✓ ${data.message}`);
      hideProgress();

      // Update header badge
      const badge = document.getElementById('pdfBadge');
      badge.classList.add('active');
      document.getElementById('pdfBadgeText').textContent = data.filename;

      // Info pills
      document.getElementById('infoPages').textContent = data.pages;
      document.getElementById('infoSize').textContent = data.size_kb + ' KB';
      document.getElementById('infoSession').textContent = sessionId.slice(0, 16) + '…';
      document.getElementById('infoPills').style.display = 'flex';
      document.getElementById('infoPills').style.flexDirection = 'flex';

      // Enable chat
      document.getElementById('questionInput').disabled = false;
      document.getElementById('btnSend').disabled = false;
      document.getElementById('questionInput').focus();

    } catch (err) {
      showStatus('error', '⚠️ Network error. Is the server running?');
      hideProgress();
      btn.disabled = false;
    }
  }

  // ── Messaging ────────────────────────────────────
  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question || isLoading) return;
    if (!sessionId) { showToast('Upload a PDF first.'); return; }

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btnSend').disabled = true;

    // Hide empty state
    document.getElementById('emptyState').style.display = 'none';

    // Append user bubble
    appendBubble('user', question);

    // Typing indicator
    const typingId = appendTyping();

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, question }),
      });

      removeTyping(typingId);
      const data = await res.json();

      if (!res.ok) {
        appendError(data.detail || 'Something went wrong.');
      } else {
        appendBubble('ai', data.answer);
      }
    } catch (err) {
      removeTyping(typingId);
      appendError('Network error. Please check your connection.');
    }

    isLoading = false;
    document.getElementById('btnSend').disabled = false;
    input.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function appendBubble(role, text) {
    const msgs = document.getElementById('messages');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const msg = document.createElement('div');
    msg.className = `msg ${role === 'user' ? 'user' : 'ai'}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'usr' : 'ai'}`;
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.textContent = time;
    bubble.appendChild(meta);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    msgs.appendChild(msg);
    msgs.scrollTop = msgs.scrollHeight;
  }

  let typingCounter = 0;
  function appendTyping() {
    const msgs = document.getElementById('messages');
    const id = 'typing-' + (++typingCounter);

    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = id;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function appendError(msg) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg-error';
    el.textContent = '⚠️ ' + msg;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Clear session ────────────────────────────────
  async function clearSession() {
    if (sessionId) {
      await fetch(`/session/${sessionId}`, { method: 'DELETE' }).catch(() => {});
    }
    sessionId = null;
    document.getElementById('messages').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Ask anything about your PDF</div>
        <div class="empty-sub">Upload a document on the left, then start asking questions here.</div>
      </div>`;
    document.getElementById('pdfBadge').classList.remove('active');
    document.getElementById('pdfBadgeText').textContent = 'No PDF loaded';
    document.getElementById('infoPills').style.display = 'none';
    document.getElementById('questionInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
    document.getElementById('btnUpload').disabled = true;
    document.getElementById('selectedFile').style.display = 'none';
    document.getElementById('fileInput').value = '';
    selectedFile = null;
    hideStatus();
  }

  // ── Helpers ──────────────────────────────────────
  function showProgress(label) {
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressFill').style.width = '5%';
  }
  function setProgress(val) {
    document.getElementById('progressFill').style.width = val + '%';
  }
  function hideProgress() {
    setTimeout(() => {
      document.getElementById('progressWrap').classList.remove('show');
      document.getElementById('progressFill').style.width = '0%';
    }, 400);
  }
  function showStatus(type, msg) {
    const box = document.getElementById('statusBox');
    box.className = `status-box show ${type}`;
    box.textContent = msg;
  }
  function hideStatus() {
    document.getElementById('statusBox').className = 'status-box';
  }
</script>
</body>
</html>
